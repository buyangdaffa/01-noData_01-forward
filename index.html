<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unity Web Player | betting-simulator</title>

    <style>
      html, body {
        margin: 0;
        padding: 0;
        border: 0;
        width: 100%;
        height: 100%;
        overflow: auto;
        background: #231F20;
        font-family: Arial, sans-serif;
        color: white;
      }

      body {
        text-align: center;
      }

      #instruction-banner {
        max-width: 1200px;
        margin: 16px auto 10px auto;
        padding: 12px 16px;
        background: #2f2a2b;
        border-radius: 10px;
        font-size: 18px;
        line-height: 1.4;
      }

      #unity-controls {
        margin: 0 auto 12px auto;
      }

      #fullscreen-button {
        background: #ffffff;
        color: #231F20;
        border: none;
        border-radius: 8px;
        padding: 10px 18px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
      }

      #fullscreen-button:hover {
        opacity: 0.9;
      }

      #unity-container {
        width: 100%;
        max-width: 1600px;
        margin: 0 auto 20px auto;
        position: relative;
      }

      #unity-canvas {
        display: block;
        width: 100%;
        height: auto;
        aspect-ratio: 16 / 9;
        max-width: 100%;
        background: #231F20;
      }

      /* Fullscreen styling */
      #unity-container:fullscreen {
        width: 100vw;
        height: 100vh;
        max-width: none;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #231F20;
      }

      #unity-container:fullscreen #unity-canvas {
        width: 100vw;
        height: 100vh;
        max-width: 100vw;
        max-height: 100vh;
        aspect-ratio: 16 / 9;
        object-fit: contain;
      }

      /* Safari fallback */
      #unity-container:-webkit-full-screen {
        width: 100vw;
        height: 100vh;
        max-width: none;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #231F20;
      }

      #unity-container:-webkit-full-screen #unity-canvas {
        width: 100vw;
        height: 100vh;
        max-width: 100vw;
        max-height: 100vh;
        aspect-ratio: 16 / 9;
        object-fit: contain;
      }
    </style>
  </head>

  <body>
    <div id="instruction-banner">
      <strong>Important:</strong> For the best experience, please click the fullscreen button before starting the task.
      This will make the charts and match information easier to read.
    </div>

    <div id="unity-controls">
      <button id="fullscreen-button" type="button">Enter Fullscreen ⤢</button>
    </div>

    <div id="unity-container">
      <canvas id="unity-canvas" width="1600" height="900" tabindex="-1"></canvas>
    </div>

    <script src="Build/01-noData_01-forward.loader.js"></script>
    <script>
      const canvas = document.querySelector("#unity-canvas");
      const unityContainer = document.querySelector("#unity-container");
      const fullscreenButton = document.querySelector("#fullscreen-button");

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        const meta = document.createElement("meta");
        meta.name = "viewport";
        meta.content = "width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes";
        document.getElementsByTagName("head")[0].appendChild(meta);

        document.body.style.textAlign = "left";
      }

      function enterFullscreen() {
        if (unityContainer.requestFullscreen) {
          unityContainer.requestFullscreen();
        } else if (unityContainer.webkitRequestFullscreen) {
          unityContainer.webkitRequestFullscreen();
        } else if (unityContainer.msRequestFullscreen) {
          unityContainer.msRequestFullscreen();
        }
      }

      fullscreenButton.addEventListener("click", enterFullscreen);

      createUnityInstance(canvas, {
        arguments: [],
        dataUrl: "Build/01-noData_01-forward.data.unityweb",
        frameworkUrl: "Build/01-noData_01-forward.framework.js.unityweb",
        codeUrl: "Build/01-noData_01-forward.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Centre for Gambling Research",
        productName: "betting-simulator",
        productVersion: "0.1.0",
      }).catch((message) => {
        alert(message);
      });
    </script>
  </body>
</html>
